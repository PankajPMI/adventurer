<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>⚔️ ADVENTURER ASSOCIATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Press+Start+2P&display=swap');

        :root {
            --glow: 0 0 25px;
            --base-font: 1rem;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow-x: hidden;
            background: #0a0a1f;
            color: #e0d4ff;
            font-family: 'Press Start 2P', cursive;
            min-height: 100dvh;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        canvas#particles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .page {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            padding: 4vw;
            background: rgba(10,10,31,0.95);
        }
        .page.active { display: flex; }

        /* HOME */
        #home {
            background: linear-gradient(135deg, #1a0033, #000033);
        }
        .guild-title {
            font-family: 'UnifrakturCook', cursive;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            color: #ffcc00;
            text-shadow: var(--glow) #ffcc00;
            margin-bottom: 2vh;
            text-align: center;
            animation: titleGlow 3s infinite alternate;
        }
        .subtitle {
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            color: #aaffff;
            margin-bottom: 8vh;
            text-shadow: 0 0 15px #aaffff;
            text-align: center;
        }
        .enter-btn {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            padding: 18px 50px;
            background: #330033;
            border: 4px solid #ffcc00;
            color: #ffcc00;
            box-shadow: var(--glow) #ffcc00;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .enter-btn:active {
            transform: scale(0.95);
        }
        .enter-btn:hover {
            background: #ffcc00;
            color: #330033;
            transform: scale(1.1);
        }

        /* FORM */
        #form {
            background: linear-gradient(180deg, #1a0033, #000022);
        }
        .form-container {
            background: rgba(20,10,50,0.85);
            padding: clamp(20px, 6vw, 40px);
            border: 6px solid #ffcc00;
            border-radius: 20px;
            box-shadow: 0 0 40px #ffcc00;
            width: min(90vw, 520px);
        }
        label {
            display: block;
            margin: 18px 0 8px;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: #ffdd88;
        }
        input, select {
            width: 100%;
            padding: 14px;
            background: #110022;
            border: 3px solid #7755ff;
            color: white;
            font-family: inherit;
            font-size: clamp(1rem, 3.5vw, 1.1rem);
            border-radius: 8px;
        }
        .reveal-btn {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            font-size: clamp(1.3rem, 5vw, 1.6rem);
            background: #ff3300;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--glow) #ff3300;
            touch-action: manipulation;
        }
        .reveal-btn:active { transform: scale(0.97); }

        /* LOADING */
        #loading {
            background: #0a001f;
        }
        .magic-circle {
            width: clamp(140px, 40vw, 180px);
            aspect-ratio: 1;
            border: 12px solid transparent;
            border-top: 12px solid #ffcc00;
            border-right: 12px solid #aa00ff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            box-shadow: 0 0 60px #ffcc00;
            margin-bottom: 5vh;
        }
        .loading-text {
            font-size: clamp(1.5rem, 6vw, 2rem);
            color: #ffcc00;
            animation: pulseText 1.5s infinite;
            text-align: center;
        }

        /* RESULT */
        #result {
            background: linear-gradient(135deg, #1a0033, #000033);
        }
        .adventurer-card {
            width: min(90vw, 440px);
            background: linear-gradient(145deg, #1f0033, #0f001f);
            border: 12px solid var(--rank-color);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 30px);
            box-shadow: 0 0 60px var(--rank-color),
                        inset 0 0 40px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            animation: cardReveal 1.2s ease-out forwards;
        }
        .card-header {
            text-align: center;
            font-size: clamp(1.4rem, 4.5vw, 1.8rem);
            color: #ffcc00;
            margin-bottom: 4vh;
            text-shadow: 0 0 15px #ffcc00;
        }
        .card-content {
            line-height: 1.7;
            font-size: clamp(0.95rem, 3.2vw, 1.15rem);
        }
        .highlight {
            color: #ffdd88;
            font-weight: bold;
        }
        .power-bar {
            height: 16px;
            background: #331133;
            border: 3px solid var(--rank-color);
            margin: 12px 0;
            border-radius: 8px;
            overflow: hidden;
        }
        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffcc00, #ff00cc);
            width: var(--power);
            transition: width 1s ease-out;
        }
        .rank-badge {
            position: absolute;
            top: -12px;
            right: 5vw;
            background: var(--rank-color);
            color: black;
            padding: 6px 20px;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            border-radius: 30px;
            box-shadow: 0 0 20px var(--rank-color);
            transform: rotate(8deg);
        }
        .max-rainbow {
            animation: rainbow 3s linear infinite;
        }
        .quote {
            margin: 6vh 0 4vh;
            font-style: italic;
            color: #aaffaa;
            text-align: center;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            padding: 15px;
            border-top: 2px dashed #7755ff;
            max-width: 90vw;
        }
        .result-btn {
            margin: 15px 8px;
            padding: 12px 35px;
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            background: #330033;
            color: #ffcc00;
            border: 4px solid #ffcc00;
            cursor: pointer;
            border-radius: 10px;
            touch-action: manipulation;
        }
        .result-btn:active { transform: scale(0.96); }

        @media (max-width: 600px) {
            .page { padding: 3vw 4vw; }
            .form-container { padding: 25px 20px; }
            .adventurer-card { padding: 20px; }
        }

        @keyframes titleGlow { from { text-shadow: 0 0 15px #ffcc00; } to { text-shadow: 0 0 45px #ffcc00; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulseText { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes cardReveal { 0% { opacity: 0; transform: scale(0.7) rotate(-8deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
        @keyframes rainbow {
            0% { border-color: #ff0000; } 14% { border-color: #ff8800; } 28% { border-color: #ffff00; }
            42% { border-color: #00ff00; } 57% { border-color: #00ffff; } 71% { border-color: #0088ff; }
            85% { border-color: #8800ff; } 100% { border-color: #ff0000; }
        }
    </style>
</head>
<body>
